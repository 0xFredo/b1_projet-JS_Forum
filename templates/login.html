<!DOCTYPE html>
<html>
<head>
    <title>Connexion</title>
</head>
<body>

    <h1>Connexion</h1>

    <form action="/login" method="POST">

        <div>
            <label>Email :</label>
            <input 
                type="email"
                name="email"
                required
            >
        </div>

        <br>

        <div>
            <label>Mot de passe :</label>
            <input 
                type="mdp"
                name="mdp"
                required
            >
        </div>

        <br>

        <button type="submit">
            Se connecter
        </button>

    </form>

</body>
</html>
