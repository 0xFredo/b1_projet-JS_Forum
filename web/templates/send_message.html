<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <title>GossYp Girl</title>

    <link rel="stylesheet" href="./static/styles.css">

    <script>
      fetch("./static/header.html")
        .then(r => r.text())
        .then(html => document.getElementById("header").innerHTML = html);
    </script>

    <script>
      fetch("./static/left-box.html")
        .then(r => r.text())
        .then(html => document.getElementById("left-box").innerHTML = html);
    </script>
  </head>
  
  <body>
    <div id="header"></div>

    <div class="container">
        <div id="left-box"></div>

        <div class="right-box">
            <h1>tips</h1>

            <p>Un lus bien croustillant à me partager ? Dis tout à ton amie GG, ton secret est mal gardé ;)</p>

            <div class="post-container">

<form
    action="/send-message"
    method="POST"
    enctype="multipart/form-data"
    class="message-form">

    <input
        type="text"
        name="sujet"
        placeholder="Sujet"
        required>

    <textarea
        name="contenu"
        placeholder="Votre message..."
        required>
    </textarea>

    <input
        type="file"
        name="piece_jointe">

    <button type="submit">
        Envoyer
    </button>

</form>

        </div>
        </div>
    </div>

  </body>
</html>
