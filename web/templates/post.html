<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <title>GossYp Girl</title>

    <link rel="stylesheet" href="/static/styles.css">

    <script>
      fetch("/static/header.html")
        .then(r => r.text())
        .then(html => document.getElementById("header").innerHTML = html);
    </script>

    <script>
      fetch("/static/left-box.html")
        .then(r => r.text())
        .then(html => document.getElementById("left-box").innerHTML = html);
    </script>
  </head>
<body>

<div class="post-container">

    <!-- ===== POST ===== -->
    <h1>{{ .Post.Title }}</h1>

    <p>
        Posté par : {{ .Post.AuthorName }}
    </p>

    <p>
        {{ .Post.Content }}
    </p>

    {{ if .Post.ImagePath }}
        <img src="/{{ .Post.ImagePath }}" width="300">
    {{ end }}

    <hr>

    <!-- ===== COMMENTAIRES ===== -->
    <h2>Commentaires</h2>

    {{ range .Comments }}

        <div class="comment">

            <p>{{ .AuthorName }}</p>

            <p>{{ .Content }}</p>

            <small>
                {{ .CreatedAt.Format "02/01/2006 à 15:04" }}
            </small>

        </div>

    {{ end }}

    <hr>

    <!-- ===== FORM COMMENTAIRE ===== -->
    <h2>Ajouter un commentaire</h2>

    <form action="/create-comment" method="POST">

        <input type="hidden" name="post_id" value="{{ .Post.ID }}">

        <textarea
            name="content"
            placeholder="Écrire un commentaire..."
            required>
        </textarea>

        <button type="submit">
            Commenter
        </button>

    </form>

    <form action="/" method="get">
        <button type="submit">
            Retour accueil
        </button>
    </form>

</div>

</body>
</html>
