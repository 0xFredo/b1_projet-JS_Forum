<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <title>GossYp Girl</title>

    <link rel="stylesheet" href="./static/styles.css">

    <script>
      fetch("./static/header.html")
        .then(r => r.text())
        .then(html => document.getElementById("header").innerHTML = html);
    </script>

    <script>
      fetch("./static/left-box.html")
        .then(r => r.text())
        .then(html => document.getElementById("left-box").innerHTML = html);
    </script>
  </head>
  
  <body>
    <div id="header"></div>

    <div class="container">
        <div id="left-box"></div>


        <div class="right-box">

    {{ range . }}

        <div class="post">

            <h2>
                {{ .Title }}
            </h2>

            <p>
                {{ .Content }}
            </p>

            {{ if .ImagePath }}

            <img
            src="/{{ .ImagePath }}"
            width="300">

            {{ end }}

            <p>
                Posté par {{ .AuthorName }}, le {{ .CreatedAt.Format "02/01/2006 à 15:04" }}
            </p>

        </div>

    {{ end }}

</div>
    </div>

  </body>
</html>
